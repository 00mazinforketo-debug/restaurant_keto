services:
  - type: web
    name: restaurant-ordering-api
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm install && npm run build --workspace @ros/shared && npm run build --workspace @ros/api && npm run prisma:generate --workspace @ros/api
    startCommand: npm run start --workspace @ros/api
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: WEB_ORIGIN
        sync: false
      - key: API_ORIGIN
        sync: false
      - key: COOKIE_DOMAIN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: restaurant-ordering-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: restaurant-ordering-kv
          property: connectionString
      - key: PIN_LOOKUP_SECRET
        generateValue: true
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CSRF_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SEED_ADMIN_PIN
        sync: false
      - key: SEED_CUSTOMER_PIN
        sync: false

databases:
  - name: restaurant-ordering-db
    plan: basic-256mb
    databaseName: restaurant_ordering_system
    user: restaurant_ordering_user

  - name: restaurant-ordering-kv
    plan: starter
